# Rubberduck Core — CLA enforcement (DRAFT / starting point)
#
# Uses CLA Assistant Lite (https://github.com/contributor-assistant/github-action) to require
# every contributor to sign CLA.md before their pull request can be merged. The bot:
#   1. Comments on each PR asking unsigned contributors to sign.
#   2. Records a signature when the contributor comments the exact sign phrase below.
#   3. Stores signatures as JSON committed to a dedicated branch (see `branch:` / `path-to-signatures:`).
#
# ── One-time setup before this works ──────────────────────────────────────────────────────
#   • Confirm the repository's default branch name (this file assumes `main`).
#   • Either let the action create the `cla-signatures` branch in THIS repo (default below),
#     OR store signatures in a separate private repo via `remote-organization-name` /
#     `remote-repository-name` + a `PERSONAL_ACCESS_TOKEN` secret (recommended so signatures
#     aren't world-readable). See the action README.
#   • Add real maintainer/bot handles to `allowlist`.
#   • Settings → Actions → General → Workflow permissions: allow read/write (or rely on the
#     `permissions:` block below).
# ──────────────────────────────────────────────────────────────────────────────────────────

name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write          # write signature file to the signatures branch (or use a remote repo)
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read and agreed with the CLA terms and conditions and I hereby sign the CLA') ||
           github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.RDCORECLA_BOT }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.RDCORECLA_SIGNATURES }}
        with:
          path-to-document: "https://github.com/rubberduck-vba/RDCore/blob/main/CLA.md"
          path-to-signatures: "signatures/v0.1a/cla-signatures.json"
          branch: "main"

          # People who never need to sign (maintainers, bots). Add the rest of the core team.
          allowlist: "RubberduckAdmin,rubberduck-dev01,dependabot[bot],*[bot]"

          remote-organization-name: "rubberduck-vba"
          remote-repository-name: "RDCore-CLA"

          custom-notsigned-prcomment: >
            Thank you for your contribution! In order for it to be merged, please read our **[Contributor License Agreement](https://github.com/rubberduck-vba/RDCore/blob/main/CLA.md)** and sign it by replying with the following comment on this _pull request_:

          custom-pr-sign-comment: '> I have read and agreed with the CLA terms and conditions and I hereby sign the CLA'
          custom-allsigned-prcomment: '✅ All contributors have signed the CLA. Thank you!<br/><hr/>V I V A T 🤝 C U C U M I S ™'
